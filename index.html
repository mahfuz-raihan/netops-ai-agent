<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetOps-AI Security Operations Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 900: '#111827', 800: '#1f2937' } } } } }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center space-x-3">
            <i data-lucide="shield" class="text-blue-500 w-8 h-8"></i>
            <h1 class="text-2xl font-bold tracking-wider">NetOps-AI <span class="text-gray-400 font-light">| SOC
                    Dashboard</span></h1>
        </div>
        <div class="flex items-center space-x-2">
            <span class="relative flex h-3 w-3">
                <span
                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500" id="status-indicator"></span>
            </span>
            <span class="text-sm text-gray-300" id="status-text">System Active</span>
        </div>
    </header>

    <main class="p-6 grid grid-cols-1 lg:grid-cols-2 gap-6 h-[calc(100vh-80px)]">

        <section class="bg-gray-800 rounded-lg border border-gray-700 flex flex-col overflow-hidden shadow-xl">
            <div class="bg-gray-700/50 px-4 py-3 border-b border-gray-700 flex items-center justify-between">
                <h2 class="font-semibold text-lg flex items-center gap-2">
                    <i data-lucide="activity" class="w-5 h-5 text-gray-400"></i> Live Network Traffic
                </h2>
                <span class="text-xs text-gray-400" id="log-count">0 logs</span>
            </div>
            <div class="overflow-y-auto flex-1 p-4" id="log-container">
                <div class="text-center text-gray-500 mt-10">Waiting for network data...</div>
            </div>
        </section>

        <section
            class="bg-gray-800 rounded-lg border border-red-900/50 flex flex-col overflow-hidden shadow-xl relative">
            <div class="absolute inset-0 bg-red-500/5 pointer-events-none"></div>
            <div class="bg-red-900/20 px-4 py-3 border-b border-red-900/50 flex items-center justify-between z-10">
                <h2 class="font-semibold text-lg flex items-center gap-2 text-red-400">
                    <i data-lucide="shield-alert" class="w-5 h-5"></i> Active Threats & Agent Approvals
                </h2>
            </div>
            <div class="overflow-y-auto flex-1 p-4 space-y-4 z-10" id="threat-container">
                <div class="text-center text-gray-500 mt-10">No active threats detected.</div>
            </div>
        </section>

    </main>

    <script>
        lucide.createIcons();

        const API_BASE = "http://127.0.0.1:8000";
        let blockedIPs = new Set();
        let dismissedThreats = new Set();
        let connectionErrorLogged = false;

        const formatTime = (isoString) => {
            const d = new Date(isoString);
            return d.toLocaleTimeString() + '.' + d.getMilliseconds().toString().padStart(3, '0');
        };

        const renderLogs = (logs) => {
            const container = document.getElementById('log-container');
            if (logs.length === 0) return;

            container.innerHTML = logs.map(log => `
                <div class="mb-2 text-sm font-mono flex items-center py-1 border-b border-gray-700/50 hover:bg-gray-700/30 transition-colors">
                    <span class="text-gray-500 w-24 flex-shrink-0">${formatTime(log.timestamp)}</span>
                    <span class="${log.is_anomaly ? 'text-red-400 font-bold' : (log.status === 'BLOCKED' ? 'text-red-600 line-through' : 'text-blue-400')} w-32 flex-shrink-0">${log.ip_address}</span>
                    <span class="${log.status === 'BLOCKED' ? 'text-red-500 font-bold' : 'text-gray-300'} w-24 flex-shrink-0">${log.action}</span>
                    <span class="${log.status === 'SUCCESS' ? 'text-green-500' : (log.status === 'BLOCKED' ? 'text-red-500 font-bold bg-red-900/40 px-2 rounded' : 'text-yellow-500')} flex-1 truncate">${log.message}</span>
                </div>
            `).join('');
        };

        const renderThreats = (anomalies) => {
            const container = document.getElementById('threat-container');
            const activeThreats = anomalies.filter(a => !blockedIPs.has(a.ip_address) && !dismissedThreats.has(a.id));

            if (activeThreats.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 mt-10 flex flex-col items-center"><i data-lucide="check-circle" class="w-12 h-12 text-green-500/50 mb-2"></i>Network is secure.</div>`;
                lucide.createIcons();
                return;
            }

            container.innerHTML = activeThreats.map(threat => `
                <div class="bg-gray-900 border border-red-500/30 rounded-lg p-4 shadow-lg transform transition-all hover:scale-[1.01]">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="bg-red-500/20 text-red-400 text-xs font-bold px-2 py-1 rounded border border-red-500/20">SEVERITY: CRITICAL</span>
                            <h3 class="text-xl font-bold mt-2 text-gray-100">Attacker IP: ${threat.ip_address}</h3>
                            <p class="text-sm text-gray-400 font-mono mt-1">${threat.message}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs text-gray-500 block">ML Confidence</span>
                            <span class="text-lg font-bold text-red-400">${(threat.anomaly_score * 100).toFixed(1)}%</span>
                        </div>
                    </div>
                    
                    <div class="bg-gray-800 rounded border border-gray-700 p-3 mb-4">
                        <span class="text-xs text-blue-400 font-bold uppercase tracking-wider mb-1 block">🤖 OpenClaw Agent Analysis</span>
                        <p class="text-sm text-gray-300 italic">"${threat.agent_report || 'Awaiting agent analysis...'}"</p>
                    </div>

                    <div class="flex space-x-3">
                        <button onclick="approveBlock('${threat.ip_address}', ${threat.id})" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-4 rounded flex items-center justify-center gap-2 transition-colors">
                            <i data-lucide="shield-alert" class="w-4 h-4"></i> Approve Firewall Block
                        </button>
                        <button onclick="dismissThreat(${threat.id})" class="bg-gray-700 hover:bg-gray-600 text-gray-300 font-bold py-2 px-4 rounded transition-colors">
                            Dismiss
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        async function fetchDashboardData() {
            try {
                // First, fetch the list of IPs that the Agent has already blocked to survive refreshes
                const blockRes = await fetch(`${API_BASE}/blocked-ips`);
                if (blockRes.ok) {
                    const blockData = await blockRes.json();
                    blockData.blocked_ips.forEach(ip => blockedIPs.add(ip));
                }

                // Then, fetch the latest logs
                const res = await fetch(`${API_BASE}/logs?limit=50`);
                if (!res.ok) throw new Error("Network response was not ok");
                const data = await res.json();

                if (connectionErrorLogged) {
                    connectionErrorLogged = false;
                    document.getElementById('status-text').innerText = "System Active";
                    document.getElementById('status-indicator').classList.replace("bg-yellow-500", "bg-green-500");
                    document.getElementById('log-count').classList.remove("text-yellow-500");
                }

                document.getElementById('log-count').innerText = `${data.logs.length} logs`;
                renderLogs(data.logs);
                renderThreats(data.logs.filter(l => l.is_anomaly === 1 || l.is_anomaly === true && l.status !== "BLOCKED"));

            } catch (err) {
                if (!connectionErrorLogged) {
                    console.warn(`Could not connect to FastAPI server at ${API_BASE}.`);
                    connectionErrorLogged = true;
                    document.getElementById('status-text').innerText = "Backend Offline";
                    document.getElementById('status-indicator').classList.replace("bg-green-500", "bg-yellow-500");
                }
            }
        }

        async function approveBlock(ipAddress, threatId) {
            try {
                const res = await fetch(`${API_BASE}/approve-block`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip_address: ipAddress })
                });

                if (res.ok) {
                    blockedIPs.add(ipAddress);
                    alert(`✅ IP ${ipAddress} has been successfully blocked at the firewall!`);
                    fetchDashboardData();
                } else {
                    throw new Error("Server rejected block request");
                }
            } catch (err) {
                alert("Backend error. Make sure Docker is running and rebuilt!");
            }
        }

        function dismissThreat(threatId) {
            dismissedThreats.add(threatId);
            fetchDashboardData();
        }

        fetchDashboardData();
        setInterval(fetchDashboardData, 2000);
    </script>
</body>

</html>
